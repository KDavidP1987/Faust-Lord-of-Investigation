[config]
schemaVersion = "0.0.1"

[package]
namespace = "kdpen"
name = "Faust"
versionNumber = "0.13.0"
description = "Pre-1.0 testing. Server-side investigation layer: admin intel on players, castles, plots & server activity, gated per-feature. Built to run with its companion client Raphael, Lord of Wisdom. Server-side only."
websiteUrl = "https://github.com/KDavidP1987/Faust-Lord-of-Investigation"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_V_Rising = "1.733.2"
deca-VampireCommandFramework = "0.10.4"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "dist/BepInEx"
target = "BepInEx"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = ["v-rising"]

[publish.categories]
v-rising = ["mods", "server-side"]
